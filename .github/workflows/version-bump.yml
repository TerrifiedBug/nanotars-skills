name: Auto Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*/files/**'
      - 'plugins/*/.claude-plugin/**'
      - 'plugins/*/skills/**'
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin name to bump (leave empty for auto-detect)'
        required: false
      level:
        description: 'Bump level'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip if this push was made by the bot (prevents infinite loop)
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed plugins
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.plugin }}" ]; then
            CHANGED="${{ github.event.inputs.plugin }} "
          else
            # Use diff-tree which correctly handles merge commits
            # (git diff HEAD~1 HEAD misses files in merge commits)
            CHANGED=$(git diff-tree --no-commit-id --name-only -r -m HEAD -- 'plugins/*/files/**' 'plugins/*/skills/**' 'plugins/*/.claude-plugin/**' | sed -n 's|^plugins/\([^/]*\)/.*|\1|p' | sort -u | tr '\n' ' ')
          fi
          printf 'plugins=%s\n' "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Changed plugins: ${CHANGED:-none}"

      - name: Determine bump level from PR labels
        id: level
        run: |
          if [ -n "${{ github.event.inputs.level }}" ]; then
            LEVEL="${{ github.event.inputs.level }}"
          else
            PR_NUM=$(git log -1 --format='%s' | grep -oP '#\K[0-9]+' | head -1 || true)
            LEVEL="patch"
            if [ -n "$PR_NUM" ]; then
              LABELS=$(gh pr view "$PR_NUM" --json labels --jq '.labels[].name' 2>/dev/null || true)
              if echo "$LABELS" | grep -qw "major"; then LEVEL="major"
              elif echo "$LABELS" | grep -qw "minor"; then LEVEL="minor"; fi
            fi
          fi
          echo "level=${LEVEL}" >> $GITHUB_OUTPUT
          echo "Bump level: ${LEVEL}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump versions
        id: bump
        run: |
          BUMPED=""
          for PLUGIN in ${{ steps.detect.outputs.plugins }}; do
            [ -z "$PLUGIN" ] && continue
            FILES_JSON="plugins/${PLUGIN}/files/plugin.json"
            META_JSON="plugins/${PLUGIN}/.claude-plugin/plugin.json"
            [ ! -f "$FILES_JSON" ] && [ ! -f "$META_JSON" ] && continue

            SOURCE_JSON="$FILES_JSON"
            [ -f "$SOURCE_JSON" ] || SOURCE_JSON="$META_JSON"
            CURRENT=$(jq -r '.version // "1.0.0"' "$SOURCE_JSON")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            case "${{ steps.level.outputs.level }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac

            NEW="${MAJOR}.${MINOR}.${PATCH}"
            if [ -f "$FILES_JSON" ]; then
              jq --arg v "$NEW" '.version = $v' "$FILES_JSON" > tmp.json && mv tmp.json "$FILES_JSON"
            fi

            if [ -f "$META_JSON" ]; then
              jq --arg v "$NEW" '.version = $v' "$META_JSON" > tmp.json && mv tmp.json "$META_JSON"
            fi

            echo "${PLUGIN}: ${CURRENT} -> ${NEW}"
            BUMPED="${BUMPED} ${PLUGIN}"
          done
          echo "bumped=${BUMPED}" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.bump.outputs.bumped != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/*/files/plugin.json plugins/*/.claude-plugin/plugin.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-bump plugin versions"
            git push
          fi
